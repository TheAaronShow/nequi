<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CannaCore | Plataforma de Pagos y Dispersiones</title>
    <style>
        /* --- ESTILOS GLOBALES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10; /* Fondo ultra oscuro */
            color: #c5c6c7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .checkout-container {
            background-color: #1f2833; /* Gris azulado oscuro */
            width: 100%;
            max-width: 950px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            overflow: hidden;
        }

        /* Responsivo para celulares */
        @media (max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
            }
        }

        /* --- COLUMNA IZQUIERDA: RESUMEN / INFO --- */
        .summary-side {
            background-color: #151a21;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid #2f3b4c;
        }

        .brand-logo {
            font-size: 24px;
            font-weight: 800;
            color: #45f3ff; /* Turquesa brillante */
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .product-info h2 {
            color: #ffffff;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .product-info p {
            font-size: 14px;
            color: #85929E;
            line-height: 1.6;
        }

        .price-tag {
            margin-top: 30px;
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
        }

        .price-tag span {
            color: #45f3ff;
        }

        .security-badge {
            margin-top: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #85929E;
        }

        /* --- COLUMNA DERECHA: FORMULARIO Y ACCIONES --- */
        .payment-side {
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .payment-side h3 {
            color: #ffffff;
            font-size: 18px;
            margin-bottom: 20px;
        }

        /* Selectores de método de pago */
        .payment-methods {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .method-btn {
            flex: 1;
            background: #2b3543;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 12px;
            color: #ffffff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 13px;
        }

        .method-btn.active {
            border-color: #45f3ff;
            background: rgba(102, 252, 241, 0.1);
            color: #45f3ff;
        }

        /* Estilos de los inputs */
        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 6px;
            color: #85929E;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            background-color: #151a21;
            border: 1px solid #2f3b4c;
            border-radius: 8px;
            color: #ffffff;
            font-size: 13px;
            outline: none;
            transition: border 0.3s ease;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #45f3ff;
        }

        .row-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Botón de acción principal */
        .pay-btn {
            width: 100%;
            background-color: #45f3ff; /* Turquesa neón */
            color: #0b0c10;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.3s ease;
        }

        .pay-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 252, 241, 0.4);
        }

        .pay-btn:disabled {
            background-color: #2f3b4c !important;
            color: #85929E !important;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Contenedor de estados del Sandbox / Logs */
        .sandbox-console {
            margin-top: 20px;
            padding: 14px;
            background-color: #0b0c10;
            border-radius: 8px;
            border-left: 4px solid #45f3ff;
            font-size: 12px;
            display: none;
            max-height: 250px;
            overflow-y: auto;
        }

        .sandbox-console-title {
            font-weight: bold;
            color: #45f3ff;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        #sandbox-status {
            color: #a5b4fc;
            line-height: 1.5;
            white-space: pre-wrap;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body>

    <div class="checkout-container">
        
        <!-- COLUMNA IZQUIERDA: Info Plataforma -->
        <div class="summary-side">
            <div>
                <div class="brand-logo" id="dynamic-brand">CannaCore</div>
                <div class="product-info" id="left-info-panel">
                    <h2>Módulo de Pruebas</h2>
                    <p>Interactúa directamente con los flujos de cobros y dispersiones del sandbox de Nequi utilizando los esquemas de datos estructurados oficiales.</p>
                </div>
            </div>

            <div class="security-badge">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#45f3ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                API Endpoint: Sandbox Activo
            </div>
        </div>

        <!-- COLUMNA DERECHA: Operaciones -->
        <div class="payment-side">
            <h3 id="panel-title">Operación de Caja</h3>
            
            <div class="payment-methods">
                <button class="method-btn active" id="tab-recaudo">Recibir Pago (Card)</button>
                <button class="method-btn" id="tab-dispersion">Dispersar Fondos (Nequi)</button>
            </div>

            <!-- Formulario Dinámico -->
            <form id="operation-form">
                <!-- Se inyecta por JS -->
            </form>

            <!-- Consola de simulación Sandbox -->
            <div class="sandbox-console" id="sandbox-console">
                <div class="sandbox-console-title">
                    <span>Log de Peticiones y Respuestas (Nequi)</span>
                    <span style="color: #85929E;">sandbox-env</span>
                </div>
                <div id="sandbox-status">Inicializando consola...</div>
            </div>
        </div>

    </div>

    <script>
        const tabRecaudo = document.getElementById('tab-recaudo');
        const tabDispersion = document.getElementById('tab-dispersion');
        const formContainer = document.getElementById('operation-form');
        const consoleContainer = document.getElementById('sandbox-console');
        const consoleStatus = document.getElementById('sandbox-status');
        const leftPanel = document.getElementById('left-info-panel');
        const panelTitle = document.getElementById('panel-title');

        // FORMULARIO: Recibo de Pago (Tarjeta)
        const recaudoFormHTML = `
            <div class="input-group">
                <label for="card-name">Tarjetahabiente</label>
                <input type="text" id="card-name" value="TheAaronShow" required>
            </div>
            <div class="input-group">
                <label for="card-number">Número de tarjeta</label>
                <input type="text" id="card-number" placeholder="4111 1111 1111 1111" maxlength="19" required>
            </div>
            <div class="row-inputs">
                <div class="input-group">
                    <label for="card-expiry">Vencimiento</label>
                    <input type="text" id="card-expiry" placeholder="12/29" maxlength="5" required>
                </div>
                <div class="input-group">
                    <label for="card-cvc">CVC</label>
                    <input type="password" id="card-cvc" placeholder="***" maxlength="3" required>
                </div>
            </div>
            <button type="submit" class="pay-btn" id="submit-btn">Procesar Recaudo ($49.99)</button>
        `;

        // FORMULARIO: Dispersión de fondos (Nequi)
        const dispersionFormHTML = `
            <div class="input-group">
                <label for="disp-phone">Número Destinatario (Nequi)</label>
                <input type="tel" id="disp-phone" value="3998764643" maxlength="10" required>
            </div>
            <div class="row-inputs">
                <div class="input-group">
                    <label for="disp-doc-type">Tipo de Doc</label>
                    <select id="disp-doc-type">
                        <option value="CC">Cédula de Ciudadanía (CC)</option>
                        <option value="CE">Cédula de Extranjería (CE)</option>
                        <option value="NIT">NIT</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="disp-doc-num">Número de Documento</label>
                    <input type="text" id="disp-doc-num" value="12345687" required>
                </div>
            </div>
            <div class="input-group">
                <label for="disp-val">Monto a Dispersar (COP)</label>
                <input type="number" id="disp-val" value="150000" required>
            </div>
            <button type="submit" class="pay-btn" id="submit-btn" style="background-color: #e02484; color: #ffffff;">
                Ejecutar Dispersión de Fondos
            </button>
        `;

        // Carga de panel por defecto
        function cargarRecaudo() {
            panelTitle.innerText = "Operación de Caja";
            leftPanel.innerHTML = `
                <h2>Licencia Developer Pro</h2>
                <p>Acceso completo al Sandbox de pruebas, APIs de recaudo push ilimitadas y soporte de integración técnica prioritario.</p>
                <div class="price-tag">$49.99 <span>/ mes</span></div>
            `;
            formContainer.innerHTML = recaudoFormHTML;
            consoleContainer.style.display = "none";

            formContainer.onsubmit = (e) => {
                e.preventDefault();
                alert("Pago por pasarela procesado con éxito.");
            };
        }

        cargarRecaudo();

        // Controladores de cambio de pestañas
        tabRecaudo.addEventListener('click', () => {
            tabRecaudo.classList.add('active');
            tabDispersion.classList.remove('active');
            cargarRecaudo();
        });

        tabDispersion.addEventListener('click', () => {
            tabDispersion.classList.add('active');
            tabRecaudo.classList.remove('active');
            panelTitle.innerText = "Panel Administrativo";
            leftPanel.innerHTML = `
                <h2>Módulo Dispersiones</h2>
                <p>Envía dinero directamente a cuentas Nequi de forma individual. Este panel consume la estructura oficial de la API: <strong>disperseFunds</strong>.</p>
                <div class="price-tag" style="font-size: 20px; margin-top: 15px;">Fondo de Caja: <span style="color: #39ff14;">$10'500,000 COP</span></div>
            `;
            formContainer.innerHTML = dispersionFormHTML;
            consoleContainer.style.display = "block";
            consoleStatus.innerHTML = "Consola lista para registrar peticiones salientes...";
            consoleStatus.style.color = "#c5c6c7";

            formContainer.onsubmit = (e) => {
                e.preventDefault();
                procesarDispersiónNequiAPI();
            };
        });

        // --- SIMULADOR DE LLAMADA API NEQUI (DISPERSIONES) ---
        async function procesarDispersiónNequiAPI() {
            const telefono = document.getElementById('disp-phone').value;
            const docTipo = document.getElementById('disp-doc-type').value;
            const docNum = document.getElementById('disp-doc-num').value;
            const valor = document.getElementById('disp-val').value;
            const submitBtn = document.getElementById('submit-btn');

            submitBtn.disabled = true;
            submitBtn.innerText = "Llamando API...";

            // Generar fechas y IDs dinámicos para simular la petición real
            const requestDate = new Date().toISOString();
            const messageID = "MSG-" + Math.floor(Math.random() * 90000000000000 + 10000000000000);
            const trackingID = "TRK" + Math.floor(Math.random() * 900000000 + 100000000);

            // Log de preparación de encabezados
            consoleStatus.innerHTML = `[INFO] Preparando Headers de Autenticación...\n` +
                                      `x-api-key: valid_api_key\n` +
                                      `Authorization: Bearer valid_token\n` +
                                      `Content-Type: application/json`;
            consoleStatus.style.color = "#ffdd67";
            await delay(1500);

            // LOG: Cuerpo de Petición (BODY JSON) enviado al endpoint exacto que ingresaste
            const requestPayload = {
                "RequestMessage": {
                    "RequestHeader": {
                        "Channel": "GLK06-C001",
                        "RequestDate": requestDate,
                        "MessageID": messageID,
                        "ClientID": "ABC12345",
                        "Destination": {
                            "ServiceName": "DispersionService",
                            "ServiceOperation": "disperseFunds",
                            "ServiceRegion": "C001",
                            "ServiceVersion": "1.0.0"
                        }
                    },
                    "RequestBody": {
                        "any": {
                            "disperseFundsRQ": {
                                "code": "NIT_440627004_00",
                                "trackingID": trackingID,
                                "phoneNumber": telefono,
                                "documentType": docTipo,
                                "documentNumber": docNum,
                                "value": valor,
                                "reference1": "ref1",
                                "reference2": "ref2",
                                "reference3": "ref3"
                            }
                        }
                    }
                }
            };

            consoleStatus.innerHTML = `[POST] https://api.sandbox.nequi.com/dispersions/v2/-services-dispersionservice-dispersefunds\n\n` +
                                      `[BODY ENVIADO]:\n` + 
                                      JSON.stringify(requestPayload, null, 2);
            consoleStatus.style.color = "#45f3ff";
            await delay(2500);

            // LOG: Respuesta de éxito (200 OK) retornada por el Sandbox
            const responsePayload = {
                "ResponseMessage": {
                    "ResponseHeader": {
                        "Channel": "GLK06-C001",
                        "RequestDate": requestDate,
                        "Status": {
                            "StatusCode": "0",
                            "StatusDesc": "SUCCESS"
                        },
                        "MessageID": messageID,
                        "ClientID": "ABC12345",
                        "Destination": {
                            "ServiceName": "DispersionService",
                            "ServiceOperation": "disperseFunds",
                            "ServiceRegion": "C001",
                            "ServiceVersion": "1.0.0"
                        }
                    },
                    "ResponseBody": {
                        "any": {}
                    }
                }
            };

            consoleStatus.innerHTML = `[HTTP STATUS]: 200 OK (Succeed)\n\n` +
                                      `[JSON RESPUESTA RECIBIDA]:\n` +
                                      JSON.stringify(responsePayload, null, 2);
            consoleStatus.style.color = "#39ff14"; // Verde neón

            submitBtn.innerText = "Dispersión Procesada";
            submitBtn.style.backgroundColor = "#2b3543";
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
